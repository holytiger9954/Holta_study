        function init() {

            // querySelectorAllм—җ н•ҙлӢ№н•Ё
            const list_h1 = $("h1")
            console.log(list_h1);       // jQuery л°°м—ҙ к°қмІҙ
            console.log(list_h1[0]);    // мҲңмҲҳн•ң(pure) javascript

            console.log($("#human"));   // м—Ҷмңјл©ҙ 0к°ң м§ңлҰ¬ л°°м—ҙ

            // text(): innerTextм—җ н•ҙлӢ№н•Ё

            $("h1").text("мӢ№лӢӨ ліҖкІҪ");
            $("h1").text("<мӢ№лӢӨ> ліҖкІҪ </мӢ№лӢӨ>");

            // html(): innerHTMLм—җ н•ҙлӢ№

            $("h1").html("<a href='javascript:void(0)'> aнғңк·ё </a>");

            $("#parent").addClass("c1 c2");

            // нҒҙлһҳмҠӨ м ңкұ°
            $("#parent").removeClass("c1");

            // нҒҙлһҳмҠӨ toggle: м—Ҷмңјл©ҙ м¶”к°Җ, мһҲмңјл©ҙ м ңкұ°
            $("#parent").toggleClass("c2");

            // нҒҙлһҳмҠӨ нҸ¬н•Ё м—¬л¶Җ
            console.log($("#parent").hasClass("c2"));

            // attr()
            // м „лӢ¬мқёмһҗк°Җ н•ҳлӮҳл©ҙ мқҪкё°
            // getAttribute
            console.log($("#parent").attr("id"));

            // setAttribute
            // м „лӢ¬мқёмһҗк°Җ л‘җк°ңл©ҙ мҶҚм„ұ ліҖкІҪ
            $("#parent").attr("data-human", "мөңкі м—җмҡ”");
            $("#parent").attr("data-human", "лҚ®м–ҙм“°кё°");

            // data-"мҶҚм„ұлӘ…" м—җм„ң "мҶҚм„ұлӘ…"мңјлЎң м ‘к·ј к°ҖлҠҘн•ҳлӢӨ
            console.log($("#parent").data("human"));

            // к°ңл°ңмһҗ лҸ„кө¬м—җм„ң м•ҲліҙмқҙлҠ” к°’ кҙҖлҰ¬н•  л•Ң мӮ¬мҡ©лҸ„ к°ҖлҠҘн•ҳлӢӨ
            $("#parent").data("к°•мӮ¬лӢҳ", "м§Ҳл¬ёмқҙмҡ”");
            console.log($("#parent").data("к°•мӮ¬лӢҳ"));

            // removeAttribute
            $("#parent").removeAttr("data-human");

            // createElement
            const child2 = $("<div class='child2'>мһҗмӢқ2</div>");
            console.log(child2);     // л°°м—ҙ
            console.log(child2[0]);  // DOM

            $("#parent").append(child2);
            // $("#parent").append(child2[0]); // л‘ҳ лӢӨ лҗЁ

            $("#parent").prepend("<div class='child0'>мһҗмӢқ0</div>");
            $("#parent").after("<div>л¶ҖлӘЁ2</div>");
            $("#parent").before("<div>л¶ҖлӘЁ0</div>");

            // лӮҙмҡ© л°°мҡ°кё°
            // $("#parent")[0].innerHTML = "";
            // $("#parent").html("");
            $("#parent").empty();
            $("#parent").remove();

            $("#id").css("backgroundColor", "yellowgreen");
            console.log($("#id").css("backgroundColor"));

            // лӮҙк°Җ мЈјм§ҖлҸ„ м•ҠмқҖ css к°’мқ„ мқҪмқ„ мҲҳ мһҲлӢӨ
            console.log($("#id").css("fontSize"));
            console.log($("#id").css("width"));

            // л„Ҳл№„ мқҪкё°
            console.log($("#id").width());
            // л„Ҳл№„ м Ғмҡ©
            $("#id").width(500)
            // $("#id").width("50%");


        }

        function bind() {
            // $("#btn1").click(function () {});
            $("#btn1").on("click", function (event) {
                console.log(this === event.currentTarget);

                console.log($("#id").val());
                $("#id").val("л°”кҫёкё°");

                console.log($($(".chk")[0]).prop("checked"));
                $($(".chk")[0]).prop("checked", false);
                console.log($(".chk").eq(0).prop("checked"));
            });

            $(".btn").on("click", function () {
                console.log("лІ„нҠј?");
                console.log(event.target);
                console.log(event.currentTarget);
                console.log(this);

            // к°ңл°ңмһҗ лҸ„кө¬ > мқҙлІӨнҠё лҰ¬мҠӨл„Ҳ кө¬кІҪ
            // $(".btn").on("click", function () {
            //     console.log("лІ„нҠј!");
            // });

            $(".btn").off("click").on("click", function (event) {

            });

            $(".btn").on("click.ajax", function (event) {

            // $(".btn").off("click");
            // мқҙлІӨнҠёлӘ…."мӢқлі„мһҗ"лЎң н•„мҡ”н•ң мқҙлІӨнҠёл§Ң м§Җмҡё мҲҳ мһҲлӢӨ
            $(".btn").off("click.ajax");

            // л¶ҖлӘЁлЎң мҳ¬лқјк°Җкё°
            // $("child")[o].parrentNode;
            console.log($(".child22").parent());

            console.log($(".child22").parent().find(".child22"));
            console.log($("#parent2").find(".child22"));
            
            $(".child22").on("click", function (event) {
                // event.stopPropagation()

                console.log("мһҗмӢқ22");

                return false;
            });
            $("#parent2").on("click", function () {
                console.log("л¶ҖлӘЁ2");

                // $(this).find(".child22").hide(); // display: none
                // $(this).find(".child22").show();
                // $(this).find(".child22").fadeToggle();
                // $(this).find(".child22").slideToggle();

                $(this).find('.child22').animate({
