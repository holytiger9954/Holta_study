<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #050505; overflow: hidden; height: 100vh; }
        /* 도형 스타일 */
        .shape {
            position: absolute;
            width: 30px;
            height: 30px;
            pointer-events: none; /* 마우스 클릭 방해 금지 */
            opacity: 0;
            border-radius: 4px; /* 살짝 둥근 사각형 */
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const colors = ['#FF3E55', '#FFBE0B', '#3A86FF', '#8338EC', '#FB5607'];
        
        window.addEventListener('mousemove', (e) => {
            createShape(e.clientX, e.clientY);
        });

        function createShape(x, y) {
            const shape = document.createElement('div');
            shape.className = 'shape';
            document.body.appendChild(shape);

            // 무작위 색상 및 모양 결정
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 20 + 20; // 20px ~ 40px

            // 초기 위치 및 스타일 설정
            gsap.set(shape, {
                x: x - size / 2,
                y: y - size / 2,
                width: size,
                height: size,
                backgroundColor: color,
                rotation: Math.random() * 180,
                scale: 0,
                opacity: 1
            });

            // 튀어나오는 애니메이션 효과
            gsap.to(shape, {
                scale: 1.5,
                rotation: "+=90",
                duration: 0.6,
                ease: "back.out(1.7)", // 튕기는 듯한 효과
                onComplete: () => {
                    // 나타난 후 서서히 사라짐
                    gsap.to(shape, {
                        opacity: 0,
                        scale: 0,
                        duration: 0.4,
                        onComplete: () => shape.remove() // 메모리 관리를 위해 제거
                    });
                }
            });
        }
    </script>
</body>
</html>
