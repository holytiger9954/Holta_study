<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 300vh;
        }

        /* 체크되었을 때 적용할 스타일 */
        .completed {
            text-decoration: line-through;
            /* 취소선 */
            color: #bbb;
            /* 글자색을 흐리게 */
            font-style: italic;
            /* 기울임꼴 */
        }

        /* 가독성을 위해 todo-row에 간격 주기 */
        .todo-row {
            margin: 5px 0;
            display: flex;
            align-items: center;
        }

        .todo-row label {
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
    <script src="asset/js/00_quiz.js"></script>
</head>

<body>
    <div>
        <h1>로그인</h1><br>
        아이디 : <input type="text" id="id"><br>
        비밀번호 : <input type="password" id="pw"><br>
        <br>
        <input type="button" id="login" value="로그인">
        <br>
    </div>
    <div id="log1"></div><br>
    <hr>

    <div>
        <h1>피자 주문</h1><br>
        피자 종류 선택
        <select id="select">
            <option value="1">치즈피자</option>
            <option value="2">불고기피자</option>
            <option value="3">페퍼로니피자</option>
            <option value="4">콤비네이션피자</option>
        </select>
        <br>
        사이즈 선택
        <label><input type="radio" name="size" value="18000" checked>small(18000)</label>
        <label><input type="radio" name="size" value="20000">medium(20000)</label>
        <label><input type="radio" name="size" value="22000">large(22000)</label>
        <br>
        도우 엣지 선택
        <label><input type="radio" name="edge" value="0" checked>thin</label>
        <label><input type="radio" name="edge" value="0">치즈</label>
        <label><input type="radio" name="edge" value="0">고구마</label>
        <label><input type="radio" name="edge" value="0">에그타르트</label>
        <label><input type="radio" name="edge" value="0">소보로</label>
        <br>
        토핑

        <label><input type="checkbox" class="topping" value="2000" checked>감자(2000)</label>
        <label><input type="checkbox" class="topping" value="500">올리브(500)</label>
        <label><input type="checkbox" class="topping" value="1000">페퍼로니(1000)</label>
        <br>
        <label><input type="checkbox" class="topping" value="2000">고구마(2000)</label>
        <label><input type="checkbox" class="topping" value="5000">새우(5000)</label>
        <label><input type="checkbox" class="topping" value="3000">베이컨(3000)</label>
        <label><input type="checkbox" class="topping" value="500">파인애플(500)</label>
        <br>
        <label><input type="button" id="confirm" value="선택완료"></label>

    </div>
    <div id="log2"></div><br>
    <hr>

    <div>
        <h1>주문과 배송</h1><br>
        주문 정보<br>
        이름 : <input type="text" id="orderName"><br>
        주소 : <input type="text" id="orderAddr"><br>
        <input type="checkbox" id="copy"> 주문 정보와 배송 정보가 같습니다<br>
        배송 정보<br>
        이름 : <input type="text" id="deliveryName"><br>
        주소 : <input type="text" id="deliveryAddr"><br>
    </div><br>
    <hr>

    <div>
        <h1>쇼핑몰</h1><br>
        <ul id="product">
            <li class="item">인기상품순</li>
            <li class="item">낮은가격순</li>
            <li class="item">높은가격순</li>
            <li class="item">신상품순</li>
        </ul><br>
    </div><br>
    <hr>

    <div>
        <h1>이미지</h1><br>
        <div class="thumbnails">
            <img src="https://cdn.pixabay.com/photo/2016/07/09/12/16/apples-1506119_1280.jpg" class="thumb" width="100">
            <img src="https://cdn.pixabay.com/photo/2015/01/27/18/32/bananas-614090_1280.jpg" class="thumb" width="100">
            <img src="https://cdn.pixabay.com/photo/2022/02/25/08/13/blood-oranges-7033738_1280.jpg" class="thumb"
                width="100">
        </div><br>

        <div>
            <img id="mainImg" src="https://cdn.pixabay.com/photo/2016/07/09/12/16/apples-1506119_1280.jpg" width="400"
                border="1">
        </div><br>
    </div><br>
    <hr>

    <div id="todo">
        <h1>할일 목록 관리 시스템</h1><br>
        <input type="text" id="inputTodo">
        <input type="button" id="addTodoList" value="추가"><br>
        <input type="checkbox" id="selectAll">전체 선택
        <input type="button" id="removeSelect" value="선택 삭제"><br>
        <div id="todoList">

        </div>
    </div>

    <script>
        // 문제1 
        // - 로그인 화면에서(아이디, 비밀번호, 로그인버튼)
        // - 로그인 버튼 클릭 시
        // 1. 아이디를 입력해주세요
        // 2. 비밀번호를 입력해주세요
        // 3. (아이디와 비밀번호가 다 있다면 아무 글씨도 없게)

        document.querySelector("#login").addEventListener("click", function () {
            document.querySelector("#log1").innerHTML = ""
            document.querySelector("#log1").style.color = "red";
            if (document.querySelector("#id").value.length === 0) {
                document.querySelector("#log1").innerHTML += "아이디 또는 전화번호를 입력해 주세요.<br>";
                document.querySelector("#id").focus();
            } else if (document.querySelector("#pw").value.length === 0) {
                document.querySelector("#log1").innerHTML += "비밀번호를 입력해 주세요.<br>";
                document.querySelector("#pw").focus();
            } else {
                document.querySelector("#log1").style.color = "green";
                document.querySelector("#log1").innerHTML += "로그인 성공!<br>";
            }
        });

        // 문제2
        // 피자 주문
        // 피자 종류 선택 select
        //    치즈피자, 불고기피자, 페퍼로니피자, 콤비네이션피자
        // 사이즈 선택 radio
        //    small(18000), medium(20000), large(22000)
        // 도우 엣지 선택 radio
        //    thin(0), 치즈(0), 고구마(0), 에그타르트(0), 소보로(0)
        // 토핑 checkbox
        //    감자(2000), 올리브(500), 페퍼로니(1000),
        //    고구마(2000), 새우(5000), 베이컨(3000), 파인애플(500)
        // [확인] 버튼 클릭 시
        // 문제 2-1 : 총액 출력
        // 문제 2-2 : 선택 내역과 총액 출력

        document.querySelector("#confirm").addEventListener("click", function () {
            // 1. 피자 종류 추출
            const select = document.querySelector("#select");
            const pizzaName = select.options[select.selectedIndex].textContent;

            // 사이즈 및 엣지 가격 추출
            const sizePrice = Number(document.querySelector("input[name='size']:checked").value);
            const edgePrice = Number(document.querySelector("input[name='edge']:checked").value);

            // 엣지 이름 추출
            const edgeName = document.querySelector("input[name='edge']:checked").parentNode.textContent.trim();

            // 토핑 합산 및 목록 추출
            let toppingTotal = 0;
            let selectedToppings = [];

            document.querySelectorAll(".topping:checked").forEach(function (item) {
                // 가격 합산
                toppingTotal += Number(item.value);

                // 텍스트에서 이름만 추출 ("감자(2000)" -> "감자")
                let rawText = item.nextSibling.textContent.trim();
                let nameOnly = rawText.split('(')[0];
                selectedToppings.push(nameOnly);
            });

            // 총액 계산
            const totalPrice = sizePrice + edgePrice + toppingTotal;

            // 결과 출력
            const log2 = document.querySelector("#log2");

            // 내역 정리
            let receipt = `[선택 내역] <br>`;
            receipt += `- 메뉴: ${pizzaName}<br>`;
            receipt += `- 엣지: ${edgeName}<br>`;
            receipt += `- 토핑: ${selectedToppings.length > 0 ? selectedToppings.join(", ") : "없음"}<br>`;
            receipt += `<strong>총 결제 금액: ${totalPrice.toLocaleString()}원</strong>`;

            log2.innerHTML = receipt;
        });

        // 문제3
        // 주문과 배송
        // 주문 정보 : 이름, 주소
        // 배송 정보 : 이름, 주소
        //      - 주문 정보와 배송 정보가 같습니다
        // 체크하면 주문 정보가 배송 정보로 복사
        // 체크 풀면 배송 정보 초기화

        document.querySelector("#copy").addEventListener("change", function () {
            // 주문 정보
            const orderName = document.querySelector("#orderName");
            const orderAddr = document.querySelector("#orderAddr");

            // 배송 정보
            const deliveryName = document.querySelector("#deliveryName");
            const deliveryAddr = document.querySelector("#deliveryAddr");

            // 체크 상태
            if (this.checked) {
                // 데이터 복사
                deliveryName.value = orderName.value;
                deliveryAddr.value = orderAddr.value;
            } else {
                // 초기화
                deliveryName.value = "";
                deliveryAddr.value = "";
            }
        });

        // 문제4
        // 인기상품순, 낮은가격순, 높은가격순, 신상품순 메뉴에서
        // 클릭한 것만 굵은 글씨로 유지

        const Items = document.querySelectorAll(".item");

        Items.forEach(function (item) {
            item.addEventListener("click", function () {

                const isBold = (this.style.fontWeight === "bold");

                Items.forEach(function (el) {
                    el.style.fontWeight = "normal";
                    el.style.color = "black";
                });

                if (!isBold) {
                    this.style.fontWeight = "bold";
                    this.style.color = "blue";
                }
            });
        });

        // 문제5
        // 썸네일이 있는 쇼핑몰
        // 썸네일에 마우스 올리면
        // 썸네일의 이미지를 오른쪽에 크게 보여준다

        const thumbs = document.querySelectorAll(".thumb");
        const mainImg = document.querySelector("#mainImg");

        thumbs.forEach(function (item) {

            item.addEventListener("mouseover", function () {

                const newSrc = this.src;

                mainImg.src = newSrc;

                thumbs.forEach(el => el.style.outline = "none");
                this.style.outline = "3px solid red";
            });
        });

        // 문제6
        // 할일을 적는 input, 추가 버튼
        // 6-1 추가 버튼을 누르면
        //      체크박스와 할일이 하단에 추가된다
        // 6-2 개별 삭제 버튼이 있고
        //      삭제 버튼 클릭 시 그 줄이 지워진다
        // 6-3 전체 선택 checkbox가 있고
        //      전체 선택 체크 시 모든 checkbox 체크
        //      전체 선택 체크 해제 시 모든 checkbox 체크 해제
        // 6-4 전체 선택 후 하나라도 해제되면 전체 선택도 해제
        //      모든 항목이 체크 되어있다면 전체 선택도 체크
        // 6-5 선택 삭제 버튼 클릭 시 선택된 내용만 삭제

        const todo = document.querySelector("#todo");
        const h1 = todo.querySelector("h1");
        const addTodoList = document.querySelector("#addTodoList");
        const inputTodo = document.querySelector("#inputTodo");
        const todoList = document.querySelector("#todoList");

        // 1. 전체 컨테이너 (#todo) 스타일링
        todo.style.width = "450px";
        todo.style.minHeight = "300px";
        todo.style.margin = "50px 0 50px 20px"; // 상 50px, 우 0, 하 50px, 좌 20px (왼쪽에서 20px 띄움)
        todo.style.padding = "30px";
        todo.style.backgroundColor = "#ffffff";
        todo.style.borderRadius = "15px";
        todo.style.boxShadow = "0 10px 25px rgba(0,0,0,0.1)";
        todo.style.fontFamily = "'Pretendard', 'Malgun Gothic', sans-serif";

        // 2. 제목 (h1) 스타일링
        h1.style.fontSize = "24px";
        h1.style.color = "#333";
        h1.style.textAlign = "center";
        h1.style.marginBottom = "20px";

        // 3. 입력창 (#inputTodo) 스타일링
        inputTodo.style.width = "280px";
        inputTodo.style.padding = "12px";
        inputTodo.style.fontSize = "16px";
        inputTodo.style.border = "2px solid #e0e0e0";
        inputTodo.style.borderRadius = "8px";
        inputTodo.style.outline = "none";
        inputTodo.style.transition = "border-color 0.3s";

        // 입력창 포커스 효과 (JS로 구현)
        inputTodo.addEventListener("focus", () => inputTodo.style.borderColor = "#4A90E2");
        inputTodo.addEventListener("blur", () => inputTodo.style.borderColor = "#e0e0e0");

        // 4. 추가 버튼 (#addTodoList) 스타일링
        addTodoList.style.padding = "12px 20px";
        addTodoList.style.fontSize = "16px";
        addTodoList.style.backgroundColor = "#4A90E2";
        addTodoList.style.color = "white";
        addTodoList.style.border = "none";
        addTodoList.style.borderRadius = "8px";
        addTodoList.style.cursor = "pointer";
        addTodoList.style.fontWeight = "bold";
        addTodoList.style.marginLeft = "8px";

        // 5. 리스트 영역 (#todoList)
        todoList.style.height = "400px";       // 고정 높이 설정
        todoList.style.overflowY = "auto";    // 내용이 넘치면 수직 스크롤바 생성
        todoList.style.marginTop = "15px";
        todoList.style.paddingRight = "5px";  // 스크롤바와 내용 사이 간격

        // 6. 제어부 (전체선택, 선택삭제) 스타일링
        const controlPanel = document.createElement("div"); // 줄바꿈 대신 div로 감싸기 효과
        controlPanel.style.marginTop = "20px";
        controlPanel.style.padding = "10px 0";
        controlPanel.style.borderTop = "1px solid #eee";
        controlPanel.style.display = "flex";
        controlPanel.style.alignItems = "center";

        // '전체 선택' 글자 스타일 (selectAll 옆의 텍스트)
        selectAll.style.width = "18px";
        selectAll.style.height = "18px";
        selectAll.style.cursor = "pointer";

        // 선택 삭제 버튼 (#removeSelect) 스타일링
        removeSelect.style.marginLeft = "auto"; // 오른쪽 끝으로 밀기
        removeSelect.style.padding = "8px 15px";
        removeSelect.style.backgroundColor = "#fff";
        removeSelect.style.color = "#ff4d4d";
        removeSelect.style.border = "1px solid #ff4d4d";
        removeSelect.style.borderRadius = "6px";
        removeSelect.style.cursor = "pointer";
        removeSelect.style.fontSize = "13px";

        // 선택 삭제 버튼 호버 효과
        removeSelect.addEventListener("mouseenter", () => {
            removeSelect.style.backgroundColor = "#ff4d4d";
            removeSelect.style.color = "white";
        });
        removeSelect.addEventListener("mouseleave", () => {
            removeSelect.style.backgroundColor = "#fff";
            removeSelect.style.color = "#ff4d4d";
        });

        // 6-1. 추가 버튼 클릭
        addTodoList.addEventListener("click", function () {
            const newValue = inputTodo.value.trim();

            if (newValue === "") {
                alert("할 일을 입력해주세요");
                return;
            }

            const div = document.createElement("div");
            div.className = "todo-row"; // 클래스 부여

            // 내부 구성 요소
            div.innerHTML =
                `<label style="font-size: 18px; font-family: 'Malgun Gothic', sans-serif; flex-grow: 1; cursor: pointer;">
                    <input type="checkbox" class="todoIndex" style="width: 18px; height: 18px; margin-right: 10px;">
                    <span class="todo-text">${newValue}</span>
                </label>
                <input type="button" class="removeIndex" value="삭제">`;

            // 중복 검사
            // 'class="todoIndex"'인 체크박스들의 옆에 있는 글자를 체크
            const items = document.querySelectorAll(".todoIndex");
            for (let item of items) {
                // item(체크박스)의 바로 다음 형제의 글자를 가져옴
                if (item.parentNode.textContent.trim() === newValue) {
                    alert("이미 등록된 할 일입니다");
                    inputTodo.value = "";
                    return;
                }
            }

            // 이 방식은 목륵을 추가하면 전체 선택 뿐만 아니라
            // 기존 체크가 모두 풀림
            // todoList.innerHTML += newRow;    

            todoList.appendChild(div); // appendChild로 기존 상태 유지
            inputTodo.value = "";
            selectAll.checked = false;

            inputTodo.focus(); // 커서를 다시 입력창으로

            // 마우스 올리면 배경색 변경
            div.addEventListener("mouseenter", function () {
                this.style.backgroundColor = "#f0f8ff"; // 아주 연한 하늘색
            });

            // 마우스 나가면 원래대로
            div.addEventListener("mouseleave", function () {
                this.style.backgroundColor = "#fff";
            });

            // 삭제 버튼 스타일링 (이벤트 위임이므로 생성 직후 버튼을 찾아 스타일을 입힘)
            const delBtn = div.querySelector(".removeIndex");
            delBtn.style.backgroundColor = "#ff4d4d"; // 버튼 색상
            delBtn.style.color = "white";             // 글자색
            delBtn.style.border = "none";
            delBtn.style.padding = "5px 12px";
            delBtn.style.borderRadius = "5px";        // 모서리 둥글게
            delBtn.style.cursor = "pointer";
            delBtn.style.fontSize = "14px";
            delBtn.style.fontWeight = "bold";

            // 버튼에 마우스 올렸을 때 색상 변경
            delBtn.addEventListener("mouseenter", function () {
                this.style.backgroundColor = "#cc0000"; // 더 진한 빨강
            });
            delBtn.addEventListener("mouseleave", function () {
                this.style.backgroundColor = "#ff4d4d";
            });

            // 전체 행(Row) 정렬 스타일
            div.style.display = "flex";
            div.style.alignItems = "center";
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #ddd";
        });

        // 엔터키 입력 시 추가 (inputTodo)
        inputTodo.addEventListener("keydown", function (e) {
            // 눌린 키가 "Enter"인지 확인
            if (e.key === "Enter") {
                // 이미 만들어둔 추가 버튼 클릭 이벤트를 강제로 실행
                // 코드를 중복해서 쓸 필요 없이 버튼을 대신 '클릭'해줌
                addTodoList.click();
            }
        });

        // 6-2. 개별 삭제 (이벤트 위임)
        todoList.addEventListener("click", function (e) {
            if (e.target.classList.contains("removeIndex")) {
                // 버튼의 부모인 div.todo-row를 삭제
                const targetRow = e.target.parentNode;

                targetRow.remove();
                syncSelectAll();
                checkedDesign();
            }

        });

        // 6-3. 전체 선택/해제
        selectAll.addEventListener("change", function () {
            const checkboxes = document.querySelectorAll(".todoIndex");
            checkboxes.forEach(cb => {
                cb.checked = this.checked;
            });
            checkedDesign();
        });

        // 6-4. 개별 체크 상태
        todoList.addEventListener("change", function (e) {
            if (e.target.classList.contains("todoIndex")) {
                syncSelectAll();
                checkedDesign();
            }
        });

        // 6-5. 선택 삭제
        removeSelect.addEventListener("click", function () {
            const checkedItems = document.querySelectorAll(".todoIndex:checked");
            if (checkedItems.length === 0) {
                alert("삭제할 항목을 선택해주세요");
                return;
            }
            checkedItems.forEach(cb => {
                cb.parentNode.parentNode.remove();
            });
            syncSelectAll();
            checkedDesign();
        });

        // 체크박스 관리 함수
        function syncSelectAll() {
            const total = document.querySelectorAll(".todoIndex").length;
            const checked = document.querySelectorAll(".todoIndex:checked").length;
            // 리스트가 비어있지 않고, 전체 개수와 체크된 개수가 같을 때만 체크
            selectAll.checked = (total > 0 && total === checked);
        }

        // 취소선 함수
        function checkedDesign() {
            const checkboxes = document.querySelectorAll(".todoIndex");

            checkboxes.forEach(cb => {
                const label = cb.parentNode;
                if (cb.checked) {
                    label.classList.add("completed");
                } else {
                    label.classList.remove("completed");
                }
            });
        }
    </script>
</body>

</html>
