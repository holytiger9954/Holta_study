<!DOCTYPE html>

    <script>
        const str = "옳거니 네가 나를 알아보누나";

        // length
        // 문자열의 길이
        console.log("str.length: ", str.length);

        // indexOf
        // 동일한 글씨가 있는지 확인
        // 있으면: 첫 글자의 index 반환
        // 없으면: -1 반환
        console.log("str.indexOf('누나')", str.indexOf("누나"));
        console.log("str.indexOf('형아')", str.indexOf("형아"));

        // replace
        // 첫 번째 전달 인자를 두 번째 전달 인자로 바꿔준다
        // 단, 처음 만나는 것만 바꾼다
        let str2 = str.replace("나", "너");
        console.log("str: ", str);
        console.log("str2: ", str2);

        // 정규 표현식을 이용해서 전체 바꾸는 방법
        str2 = str.replace(/나/g, "너"); // 정규표현식
        console.log("str2: ", str2);

        // slice(시작 index, 끝 index)
        // 시작 index부터 끝 index 바로 앞까지 복사
        str2 = str.slice(4, 6);
        console.log("str: ", str);
        console.log("str2: ", str2);

        // split
        str2 = str.split(" ");
        console.log("str2: ", str2);

        // substr
        // 시작 index, count
        str2 = str.substr(4, 2);
        console.log("str2: ", str2);

        // substring
        // 시작 index, 끝 index 바로 앞
        str2 = str.substring(4, 6);
        console.log("str2: ", str2);

        // trim
        let str3 = "   1   2       3     ";
        str2 = str3.trim();
        console.log(`[${str2}]`);

        // ---------------------------------------------
        // 문제1
        // 어떤 이메일이라도 id를 출력해보자
        // study.todair@gmail.com -> study.todair 이부분
        let email = "study.todair@gmail.com";
        const id = email.slice(0, email.indexOf("@"))
        console.log("id: ", id);

        console.log("---------------------");
        // 문제2
        // 보안상 이메일의 앞 두자리를 제외하고 *처리
        // study.todair@gmail.com -> st**********@gmail.com
        const [idP, domainP] = email.split("@");
        const preidP = idP.substr(0, 2);
        const idCount = idP.length - preidP.length;
        let idid = "";
        for (let i = 1; i <= idCount; i++) {
            idid += "*";
        }
        let idResult = preidP + idid;
        let emailP = idResult + "@" + domainP;
        console.log("emailP: ", emailP);
        
        console.log("---------------------");

        let idx1 = url.indexOf(query) + query.length;
        console.log("idx1: ", idx1);

        let sub = url.substr(idx1);
        console.log("sub: ", sub);

        let andIndex = sub.indexOf("&");
        let idx2 = idx1 + andIndex;
        console.log("idx2: ", idx2);

        let search = "";

        if (andIndex == -1) {
            search = url.substring(idx1);
        } else {
            search = url.substring(idx1, idx2);
        }
        console.log("search: ", search);
