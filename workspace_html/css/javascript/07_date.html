<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const now = new Date();
        console.log(now);
        
        const y = now.getFullYear();
        console.log(y, "년");
        
        const m = now.getMonth();
        console.log(m + 1, "월"); // 월만 1 더하기
        
        const d = now.getDate();
        console.log(d, "일");
        
        const w = now.getDay();
        console.log(w, "요일"); // 일요일: 0 ~ 토요일: 6
        
        const h = now.getHours();
        console.log(h, "시");
        
        const mi = now.getMinutes();
        console.log(mi, "분");
        
        const s = now.getSeconds();
        console.log(s, "초");
        
        const iso = now.toISOString();
        console.log(iso);
        const arr = iso.split("T");
        console.log(arr);
        console.log(arr[0]);

        const timestamp = now.getTime();
        console.log(timestamp);

        let before = new Date().getTime();
        for(let i = 0; i < 1000; i++){
            console.log(1);
        }
        let after = new Date().getTime();
        console.log("after - before", after - before);

        let time = new Date("2026-03-27");
        console.log(time.toISOString());
        
        let now2 = new Date();
        console.log(now2.toISOString());
        console.log(now2.getHours());
        now2.setHours(now2.getHours() + 3);
        console.log(now2.getHours());

    </script>
</head>

</body>
</html>
