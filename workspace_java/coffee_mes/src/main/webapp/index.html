
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coffee MES Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; margin:20px; background:#f5f6fa;}
.card {display:inline-block; padding:15px; margin:10px; background:white; border-radius:10px; width:200px;}
.container {display:flex; flex-wrap:wrap;}
.chart-box {width:45%; background:white; margin:10px; padding:15px; border-radius:10px;}
</style>
</head>
<body>

<h2>📊 관리자 대시보드</h2>

<div class="container">
<div class="card">작업지시: 12</div>
<div class="card">생산량: 340</div>
<div class="card">불량: 15</div>
<div class="card">출하: 290</div>
</div>

<div class="container">
<div class="chart-box">
<canvas id="prodChart"></canvas>
</div>

<div class="chart-box">
<canvas id="defectChart"></canvas>
</div>
</div>

<script>
new Chart(document.getElementById('prodChart'), {
    type: 'bar',
    data: {
        labels: ['월','화','수','목','금'],
        datasets: [{
            label: '생산량',
            data: [120,150,132,180,160]
        }]
    }
});

new Chart(document.getElementById('defectChart'), {
    type: 'pie',
    data: {
        labels: ['맛 이상','용량 부족','포장 불량'],
        datasets: [{
            data: [5,7,3]
        }]
    }
});
</script>

</body>
</html>
